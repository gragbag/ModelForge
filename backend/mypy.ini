# mypy configuration for the ModelForge backend.
[mypy]
# Third-party libs (boto3, celery, pandas, sklearn, joblib) don't ship type
# stubs, so mypy can't analyze them. Treat those imports as untyped instead of
# erroring — a standard, widely-used setting.
ignore_missing_imports = True

# Alembic migrations are auto-generated; don't type-check them.
exclude = alembic/