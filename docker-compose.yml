# ============================================================================
# ModelForge — local development services
# ----------------------------------------------------------------------------
# This brings up the SUPPORTING services your backend talks to:
#   - postgres    : the database (stores datasets, jobs, etc.)
#   - redis       : the queue Celery uses to hand jobs to the worker (Step 5)
#   - localstack  : a fake AWS S3 running locally, so you never touch real AWS
#
# Run everything with:
#     docker compose up -d        # -d = detached (runs in the background)
# Check status:
#     docker compose ps
# Stop everything:
#     docker compose down         # add -v to also wipe the data volumes
#
# This now runs the ENTIRE stack: your backend + worker, plus the supporting
# services (postgres, redis, localstack). `docker compose up` boots everything.
#
# Note: the backend and worker share ONE image (built from backend/Dockerfile);
# they differ only in the command they run. Inside the Docker network they reach
# each other by SERVICE NAME (postgres, redis, localstack) — not localhost —
# which is why the env vars below use those names.
# ============================================================================

services:
  # --- Backend API (your code) --------------------------------------------
  backend:
    build:
      context: ./backend
    image: modelforge-app # name the built image so the worker can reuse it
    container_name: modelforge-backend
    restart: unless-stopped
    environment:
      # Inside the network, reach services by name (not localhost). These env
      # vars override the defaults in app/core/config.py.
      DATABASE_URL: postgresql://modelforge:modelforge@postgres:5432/modelforge
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://localstack:4566
      MLFLOW_TRACKING_URI: http://mlflow:5000
      RUN_MIGRATIONS: "true" # backend runs migrations on startup (entrypoint.sh)
    ports:
      - "8000:8000" # expose the API on the host
    depends_on:
      # Wait until each dependency is HEALTHY before starting (so migrations and
      # bucket-creation don't run against a not-yet-ready service).
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy

  # --- Celery worker (same image, different command) ----------------------
  worker:
    build:
      context: ./backend
    image: modelforge-app # reuses the image built by `backend`
    container_name: modelforge-worker
    restart: unless-stopped
    # Override the default CMD: run a Celery worker instead of uvicorn.
    command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info"]
    environment:
      DATABASE_URL: postgresql://modelforge:modelforge@postgres:5432/modelforge
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://localstack:4566
      MLFLOW_TRACKING_URI: http://mlflow:5000
      # No RUN_MIGRATIONS here — only the backend should run migrations.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      backend:
        condition: service_started # start after backend (which runs migrations)
  # --- PostgreSQL: the relational database --------------------------------
  postgres:
    image: postgres:16
    container_name: modelforge-postgres
    # Auto-restart after a reboot or crash, unless you explicitly stopped it
    # (e.g. with `docker compose stop`/`down`). So services come back on boot.
    restart: unless-stopped
    environment:
      # These create the database + user on first startup. They must match the
      # DATABASE_URL your app uses (see backend/app/core/config.py).
      POSTGRES_USER: modelforge
      POSTGRES_PASSWORD: modelforge
      POSTGRES_DB: modelforge
    ports:
      - "5432:5432" # host:container — lets your local uvicorn reach the DB
    volumes:
      - postgres_data:/var/lib/postgresql/data # persists data across restarts
      # Init scripts run ONCE on a fresh volume — creates the separate `mlflow` DB.
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      # Compose can tell when postgres is actually ready to accept connections.
      test: ["CMD-SHELL", "pg_isready -U modelforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Redis: the message broker for Celery (used in Step 5) --------------
  redis:
    image: redis:7
    container_name: modelforge-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- LocalStack: a local stand-in for AWS S3 ----------------------------
  localstack:
    image: localstack/localstack:3
    container_name: modelforge-localstack
    restart: unless-stopped
    environment:
      - SERVICES=s3 # we only need S3 for now
      - DEBUG=0
      - PERSISTENCE=1 # keep S3 data (buckets/objects) across restarts
    ports:
      - "4566:4566" # the single LocalStack edge port (matches s3_endpoint_url)
    volumes:
      # Persist LocalStack's state to a named volume, so buckets survive a
      # restart — same idea as the postgres_data volume below.
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:4566/_localstack/health | grep -q '\"s3\": \"available\"' || curl -s http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- Prometheus: scrapes & stores metrics from the backend --------------
  prometheus:
    image: prom/prometheus:latest
    container_name: modelforge-prometheus
    restart: unless-stopped
    volumes:
      # Mount our scrape config into the container.
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090" # Prometheus UI at http://localhost:9090
    depends_on:
      - backend

  # --- Grafana: dashboards on top of Prometheus ---------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: modelforge-grafana
    restart: unless-stopped
    environment:
      # Default login. (Fine for local dev; never hardcode in production.)
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      # Auto-provision the Prometheus data source on startup.
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000" # Grafana UI at http://localhost:3000
    depends_on:
      - prometheus

  # --- MLflow: experiment tracking + model registry -----------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    container_name: modelforge-mlflow
    restart: unless-stopped
    # Install the Postgres + S3 deps MLflow needs, then run the tracking server:
    #  - backend store (run metadata) -> the separate `mlflow` Postgres database
    #  - artifact store               -> S3 (LocalStack); server proxies uploads
    command: >
      bash -c "pip install --no-cache-dir psycopg2-binary boto3 &&
      mlflow server
      --backend-store-uri postgresql://modelforge:modelforge@postgres:5432/mlflow
      --artifacts-destination s3://mlflow-artifacts
      --host 0.0.0.0 --port 5000"
    environment:
      # Point MLflow's S3 client at LocalStack (same trick as your app's boto3).
      MLFLOW_S3_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "5000:5000" # MLflow UI at http://localhost:5000
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy

# Named volumes so data survives `docker compose down` (but not down -v).
volumes:
  postgres_data:
  localstack_data:
  prometheus_data:
  grafana_data:
