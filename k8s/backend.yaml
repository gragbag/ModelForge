# Backend API: a Deployment (runs the uvicorn pods) + a Service (stable address).
#
# This runs the SAME modelforge-app image you built in Step 7. Because kind
# can't pull it from a registry, we load it into the cluster manually
# (`kind load docker-image modelforge-app`) and set imagePullPolicy so k8s uses
# that local copy instead of trying to download it.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: modelforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: modelforge-app:latest
          imagePullPolicy: IfNotPresent # use the locally-loaded image; don't pull
          # Load all keys from the ConfigMap as environment variables
          # (DATABASE_URL, REDIS_URL, S3_ENDPOINT_URL).
          envFrom:
            - configMapRef:
                name: modelforge-config
          env:
            - name: RUN_MIGRATIONS
              value: "true" # backend runs Alembic migrations on startup
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: modelforge
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
