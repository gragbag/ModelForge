# Redis: a Deployment + a Service. No PVC — the queue is transient; we don't
# need it to survive restarts for this demo.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: modelforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: modelforge
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
