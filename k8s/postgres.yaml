# PostgreSQL: a Deployment + a PersistentVolumeClaim (for durable storage) + a
# Service (stable address other pods reach it at).
#
# Three objects, top to bottom:
#   1. PVC      — requests a chunk of durable disk so data survives pod restarts
#   2. Deployment — runs the postgres container, mounting that disk
#   3. Service  — gives it the stable DNS name "postgres" inside the namespace
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: modelforge
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: modelforge
spec:
  replicas: 1 # a single database instance (you don't casually scale a DB)
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            # Pull credentials from the Secret defined in config.yaml.
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: modelforge-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: modelforge-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: modelforge
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            # k8s won't send traffic until this passes (pg is accepting conns).
            exec:
              command: ["pg_isready", "-U", "modelforge"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres # <-- this name is the hostname other pods use
  namespace: modelforge
spec:
  selector:
    app: postgres # routes to pods with this label
  ports:
    - port: 5432
      targetPort: 5432
