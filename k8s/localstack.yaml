# LocalStack (fake S3): a Deployment + a Service. Uses an emptyDir volume —
# storage that lasts the pod's lifetime (good enough for a local demo; the
# backend re-creates buckets on startup anyway).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  namespace: modelforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:3
          env:
            - name: SERVICES
              value: s3
          ports:
            - containerPort: 4566
          readinessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /var/lib/localstack
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
  namespace: modelforge
spec:
  selector:
    app: localstack
  ports:
    - port: 4566
      targetPort: 4566
